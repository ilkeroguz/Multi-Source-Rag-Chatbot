<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Source RAG Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2a2a3e 100%);
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Sidebar */
        .sidebar {
            width: 320px;
            background: rgba(30, 30, 46, 0.95);
            border-right: 1px solid #3a3a4e;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 24px;
            color: #6c63ff;
            margin-bottom: 5px;
        }

        .logo p {
            font-size: 12px;
            color: #a0a0a0;
        }

        .upload-section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #a0a0a0;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .upload-btn {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #6c63ff 0%, #5a52d5 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(108, 99, 255, 0.4);
        }

        .upload-btn:active {
            transform: translateY(0);
        }

        .url-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .url-input {
            flex: 1;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #3a3a4e;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 14px;
        }

        .url-input:focus {
            outline: none;
            border-color: #6c63ff;
        }

        .small-btn {
            padding: 10px 15px;
            background: #6c63ff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .small-btn:hover {
            background: #5a52d5;
        }

        .sources-list {
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
        }

        .source-item {
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .source-type {
            color: #6c63ff;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 10px;
        }

        .clear-history-btn {
            margin-top: auto;
            padding: 12px;
            background: rgba(255, 59, 48, 0.2);
            color: #ff3b30;
            border: 1px solid #ff3b30;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .clear-history-btn:hover {
            background: rgba(255, 59, 48, 0.3);
        }

        /* Main Chat Area */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .chat-header {
            padding: 20px;
            background: rgba(30, 30, 46, 0.95);
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .session-info {
            font-size: 14px;
            color: #a0a0a0;
        }

        .session-id {
            color: #6c63ff;
            font-weight: 600;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: rgba(30, 30, 46, 0.5);
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .message {
            margin-bottom: 20px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-header {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #a0a0a0;
        }

        .user-message .message-header {
            color: #6c63ff;
        }

        .assistant-message .message-header {
            color: #00d4aa;
        }

        .message-content {
            padding: 15px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 14px;
        }

        .user-message .message-content {
            background: linear-gradient(135deg, #6c63ff 0%, #5a52d5 100%);
            color: white;
            margin-left: 20%;
        }

        .assistant-message .message-content {
            background: rgba(255, 255, 255, 0.05);
            color: #e0e0e0;
            margin-right: 20%;
        }

        .message-sources {
            margin-top: 10px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            font-size: 12px;
        }

        .source-tag {
            display: inline-block;
            padding: 4px 8px;
            background: rgba(108, 99, 255, 0.3);
            border-radius: 4px;
            margin: 4px;
            font-size: 11px;
        }

        .chat-input-area {
            display: flex;
            gap: 10px;
            padding: 20px;
            background: rgba(30, 30, 46, 0.95);
            border-radius: 12px;
        }

        .chat-input {
            flex: 1;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #3a3a4e;
            border-radius: 10px;
            color: #e0e0e0;
            font-size: 14px;
            resize: none;
            font-family: inherit;
        }

        .chat-input:focus {
            outline: none;
            border-color: #6c63ff;
        }

        .send-btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #6c63ff 0%, #5a52d5 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(108, 99, 255, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            background: #00d4aa;
            color: white;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            animation: slideInRight 0.3s ease;
            z-index: 1000;
        }

        .notification.error {
            background: #ff3b30;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        input[type="file"] {
            display: none;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
        }

        ::-webkit-scrollbar-thumb {
            background: #6c63ff;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #5a52d5;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo">
                <h1>🤖 RAG Chatbot</h1>
                <p>Multi-Source Knowledge Assistant</p>
            </div>

            <div class="upload-section">
                <div class="section-title">📄 Upload Documents</div>

                <input type="file" id="pdfInput" accept=".pdf">
                <button class="upload-btn" onclick="document.getElementById('pdfInput').click()">
                    📑 Upload PDF
                </button>

                <input type="file" id="csvInput" accept=".csv">
                <button class="upload-btn" onclick="document.getElementById('csvInput').click()">
                    📊 Upload CSV
                </button>

                <div class="url-input-group">
                    <input type="text" id="urlInput" class="url-input" placeholder="Enter URL...">
                    <button class="small-btn" onclick="uploadURL()">Add</button>
                </div>
            </div>

            <div class="upload-section">
                <div class="section-title">📚 Knowledge Sources (<span id="sourceCount">0</span>)</div>
                <button class="small-btn" onclick="loadSources()" style="width: 100%; margin-bottom: 10px;">
                    🔄 Refresh Sources
                </button>
                <div id="sourcesList" class="sources-list"></div>
            </div>

            <button class="clear-history-btn" onclick="clearHistory()">
                🗑️ Clear Chat History
            </button>
        </div>

        <!-- Main Chat Area -->
        <div class="main-area">
            <div class="chat-header">
                <div class="session-info">
                    Session: <span class="session-id" id="sessionId"></span>
                </div>
            </div>

            <div id="chatMessages" class="chat-messages"></div>

            <div class="chat-input-area">
                <textarea id="chatInput" class="chat-input" placeholder="Ask me anything about your documents..." rows="1"></textarea>
                <button id="sendBtn" class="send-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        // Generate or retrieve session ID
        let sessionId = localStorage.getItem('sessionId');
        if (!sessionId) {
            sessionId = 'session_' + Date.now();
            localStorage.setItem('sessionId', sessionId);
        }
        document.getElementById('sessionId').textContent = sessionId;

        // API base URL
        const API_BASE = '/api';

        // Initialize
        loadHistory();
        loadSources();

        // File upload handlers
        document.getElementById('pdfInput').addEventListener('change', (e) => uploadFile(e.target.files[0], 'pdf'));
        document.getElementById('csvInput').addEventListener('change', (e) => uploadFile(e.target.files[0], 'csv'));

        // Enter key to send message
        document.getElementById('chatInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        async function uploadFile(file, type) {
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            try {
                showNotification(`Uploading ${type.toUpperCase()}...`);
                const response = await fetch(`${API_BASE}/upload/${type}`, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (response.ok) {
                    showNotification(`✅ ${file.name} uploaded successfully! (${result.chunks_added} chunks)`);
                    loadSources();
                } else {
                    showNotification(`❌ Upload failed: ${result.detail}`, true);
                }
            } catch (error) {
                showNotification(`❌ Error: ${error.message}`, true);
            }

            // Reset file input
            document.getElementById(type + 'Input').value = '';
        }

        async function uploadURL() {
            const urlInput = document.getElementById('urlInput');
            const url = urlInput.value.trim();

            if (!url) {
                showNotification('❌ Please enter a URL', true);
                return;
            }

            try {
                showNotification('Fetching URL content...');
                const response = await fetch(`${API_BASE}/upload/url`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });

                const result = await response.json();

                if (response.ok) {
                    showNotification(`✅ URL content added! (${result.chunks_added} chunks)`);
                    urlInput.value = '';
                    loadSources();
                } else {
                    showNotification(`❌ Failed: ${result.detail}`, true);
                }
            } catch (error) {
                showNotification(`❌ Error: ${error.message}`, true);
            }
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();

            if (!message) return;

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<span class="loading"></span>';

            // Add user message to UI
            addMessage('user', message);
            input.value = '';

            try {
                const response = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message,
                        session_id: sessionId,
                        stream: false
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    addMessage('assistant', result.response, result.sources);
                } else {
                    addMessage('assistant', `Error: ${result.detail}`, []);
                }
            } catch (error) {
                addMessage('assistant', `Error: ${error.message}`, []);
            }

            sendBtn.disabled = false;
            sendBtn.textContent = 'Send';
        }

        function addMessage(role, content, sources = []) {
            const messagesDiv = document.getElementById('chatMessages');

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}-message`;

            const header = document.createElement('div');
            header.className = 'message-header';
            header.textContent = role === 'user' ? '👤 You' : '🤖 Assistant';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;

            messageDiv.appendChild(header);
            messageDiv.appendChild(contentDiv);

            // Add sources if available
            if (sources && sources.length > 0) {
                const sourcesDiv = document.createElement('div');
                sourcesDiv.className = 'message-sources';
                sourcesDiv.innerHTML = '<strong>📚 Sources:</strong><br>';

                sources.forEach(source => {
                    const sourceTag = document.createElement('span');
                    sourceTag.className = 'source-tag';
                    sourceTag.textContent = source.metadata?.file_name || source.metadata?.url || 'Document';
                    sourcesDiv.appendChild(sourceTag);
                });

                messageDiv.appendChild(sourcesDiv);
            }

            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function loadHistory() {
            try {
                const response = await fetch(`${API_BASE}/history/${sessionId}`);
                const result = await response.json();

                if (response.ok && result.messages) {
                    result.messages.forEach(msg => {
                        addMessage(msg.role, msg.content, msg.metadata?.sources);
                    });
                }
            } catch (error) {
                console.error('Error loading history:', error);
            }
        }

        async function clearHistory() {
            if (!confirm('Are you sure you want to clear the chat history?')) return;

            try {
                const response = await fetch(`${API_BASE}/history/${sessionId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    document.getElementById('chatMessages').innerHTML = '';
                    showNotification('✅ Chat history cleared');
                }
            } catch (error) {
                showNotification(`❌ Error: ${error.message}`, true);
            }
        }

        async function loadSources() {
            try {
                const response = await fetch(`${API_BASE}/sources`);
                const result = await response.json();

                if (response.ok) {
                    const sourcesList = document.getElementById('sourcesList');
                    const sourceCount = document.getElementById('sourceCount');

                    sourceCount.textContent = result.data.sources.length;

                    if (result.data.sources.length === 0) {
                        sourcesList.innerHTML = '<div style="color: #a0a0a0; font-size: 12px;">No sources yet</div>';
                    } else {
                        sourcesList.innerHTML = result.data.sources.map(source => `
                            <div class="source-item">
                                <div class="source-type">${source.source_type}</div>
                                <div style="margin-top: 4px; word-break: break-all;">${source.source}</div>
                                <div style="margin-top: 4px; color: #6c63ff; font-size: 11px;">${source.chunk_count} chunks</div>
                            </div>
                        `).join('');
                    }
                }
            } catch (error) {
                console.error('Error loading sources:', error);
            }
        }

        function showNotification(message, isError = false) {
            const notification = document.createElement('div');
            notification.className = `notification ${isError ? 'error' : ''}`;
            notification.textContent = message;

            document.body.appendChild(notification);

            setTimeout(() => {
                notification.remove();
            }, 3000);
        }
    </script>
</body>
</html>
